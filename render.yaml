services:
  - type: web
    name: messenger
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: messenger-db
          property: connectionString

databases:
  - name: messenger-db
    databaseName: messenger
    plan: free
